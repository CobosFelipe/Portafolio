<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/calculator.css">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <title>Calculadora</title>
  </head>
  <body>
    <!-- return to home -->
    <nav>
      <a href="index.html"><i class="fi fi-rr-house-chimney"> Inicio</i></a>
      <a href="login.html"><i class="fi fi-rr-key"></i> LogIn</a>
      <a href="./exercises1.html"><i class="fi fi-rr-keyboard"></i> 1</a>
      <a href="./exercises2.html"><i class="fi fi-rr-keyboard"></i> 2</a>
      <a href="./exercises3.html"><i class="fi fi-rr-keyboard"></i> 3</a>
      <a href="./exercises4.html"><i class="fi fi-rr-keyboard"></i> 4</a>
    </nav>
    
    <!-- Ejercicio -->
    <div class="calculadora">
        <h1>Calculadora</h1>
        <div class="display">
            <input type="text" id="inputNumber" />
            <!-- <input type="text" id="inputNumber2"> -->
        </div>
        <!-- botones -->
        <div class="table">
        <table>
            <tr>
            <td><button id="btnPorcent" class="operator">%</button></td>
            <td><button id="btnCE" class="operator">CE</button></td>
            <td><button id="btnC" class="operator">C</button></td>
            <td><button id="btnDel" class="operator">DEL</button></td>
            </tr>
            <tr>
            <td><button id="">--</button></td>
            <td><button id="">--</button></td>
            <td><button id="">--</button></td>
            <td><button id="btnDiv" class="operator">/</button></td>
            </tr>
            <tr>
            <td><button id="btn7">7</button></td>
            <td><button id="btn8">8</button></td>
            <td><button id="btn9">9</button></td>
            <td><button id="btnMulti" class="operator">X</button></td>
            </tr>
            <tr>
            <td><button id="btn4">4</button></td>
            <td><button id="btn5">5</button></td>
            <td><button id="btn6">6</button></td>
            <td><button id="btnRest" class="operator">-</button></td>
            </tr>
            <tr>
            <td><button id="btn1">1</button></td>
            <td><button id="btn2">2</button></td>
            <td><button id="btn3">3</button></td>
            <td><button id="btnSum" class="operator">+</button></td>
            </tr>
            <tr>
            <td><button id="" class="operator">--</button></td>
            <td><button id="btn0">0</button></td>
            <td><button id="btnPoint" class="operator">.</button></td>
            <td><button id="btnEqual" class="operator">=</button></td>
            </tr>
        </table>
        </div>
    </div>
    <!-- <script src="./js/level_5/calculator2.js"></script> -->
    <script src="./js/level_5/calculator_v2.js"></script>
  </body>
</html>
